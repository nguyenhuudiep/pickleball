version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: pickleball_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: pickleball
    volumes:
      - mongodb_data:/data/db
    networks:
      - pickleball_network

  backend:
    build: ./backend
    container_name: pickleball_backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/pickleball
      JWT_SECRET: your_jwt_secret_key_here
      JWT_EXPIRE: 7d
      NODE_ENV: development
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - pickleball_network
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: pickleball_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - pickleball_network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  pickleball_network:
    driver: bridge
